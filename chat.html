<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="css/styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Kokoa Talk</title>
</head>
<body id="chat-screen">
    <div class="status-bar">
        <div class="status-bar__column">
            <span>NO Service</span>
            <i class="fa-solid fa-wifi"></i>
        </div>
        <div class="status-bar__column">
            <span>11:11</span>
        </div>
        <div class="status-bar__column">
            <span>111%</span>
            <i class="fa-solid fa-battery-full fa-lg"></i>
            <i class="fa-solid fa-bolt"></i>
        </div>
    </div>
        
    <header class="alt-header">
        <div class="alt-header__coulmn">
            <a href="chats.html">
                <i class="fa-solid fa-angle-left fa-2x"></i>
            </a>
        </div>
        <div class="alt-header__coulmn">
            <h1 class="alt-header__title">Gang</h1>
        </div>
        <div class="alt-header__coulmn">
            <span><i class="fa-solid fa-magnifying-glass fa-2x"></i></span>
            <span><i class="fa-solid fa-bars fa-2x"></i></span>
        </div>
    </header>

    <main class="main-screen main-chat">
        
        <div class="chat__timestamp">
            Tuesday, June 30, 2020
        </div>

        <div class="message-row">
            <img src="https://searchad-phinf.pstatic.net/MjAyMzExMTRfNTEg/MDAxNjk5OTM3MDM4MzM2.wCmExw3AUNdAEfGIMNI7UX1Hb3Dotmi8PiaOXF-CSMgg.DyikBUBaCQAnae1aL0Gy7TlWz4BpGn5WC8DOPZ_v6VMg.JPEG/12882-d474de73-1231-460d-9d19-dec772207ad9.jpg?type=f160_160">
            <div class="message-row__content">
                <span class="message__author">Nico</span>
                <div class="message__info">
                    <span class="message__bubble">Hi!</span>
                    <span class="message__time">11:11</span>
                </div>
            </div>
        </div>

        <div class="message-row message-row--own">
            <div class="message-row__content">
                <div class="message__info">
                    <span class="message__bubble">Hi!</span>
                    <span class="message__time">11:11</span>
                </div>
            </div>
        </div>

    </main>


    <form class="reply">
        <div class="reply__column">
            <i class="fa-regular fa-square-plus fa-lg"></i>
        </div>
        <div class="reply__column">
            <input type="text" placeholder="Write a message...">
            <i class="fa-regular fa-face-smile"></i>
            <button>
                <i class="fa-solid fa-arrow-up"></i>
            </button>
        </div>
    </form>

  


    <script src="https://kit.fontawesome.com/6c5323e23d.js" crossorigin="anonymous"></script>
</body>
</html>
